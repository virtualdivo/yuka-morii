<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Yuka Morii">
<title>Yuka Morii — Colección</title>
<link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;700;900&family=Noto+Sans+JP:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--white:#ffffff;--off:#f8f7f5;--ink:#1a1a1a;--mid:#888;--light:#e0e0e0;
  --clay:#d4a574;--green:#66bb6a;--green-bg:#c8e6c9;--blue:#b8d4e8;--blue-dark:#5c8fa8;
  --safe-top:env(safe-area-inset-top,0px);--safe-bot:env(safe-area-inset-bottom,0px)}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:"Noto Sans JP",sans-serif;background:var(--off);color:var(--ink);
  min-height:100vh;-webkit-font-smoothing:antialiased;
  padding-bottom:calc(var(--safe-bot) + 80px)}
header{background:var(--white);text-align:center;border-bottom:1px solid var(--light);
  padding:calc(var(--safe-top) + 18px) 16px 14px;position:sticky;top:0;z-index:50}
.title{font-family:"Zen Maru Gothic",sans-serif;font-weight:900;font-size:26px}
.subtitle{font-family:"Zen Maru Gothic",sans-serif;font-size:10px;color:var(--mid);
  letter-spacing:2.5px;text-transform:uppercase;margin-top:2px}
.stats{display:flex;justify-content:center;gap:20px;margin-top:10px}
.stat{font-family:"Zen Maru Gothic",sans-serif;font-size:11px;color:var(--mid);text-align:center}
.stat strong{display:block;font-size:19px;font-weight:700;color:var(--ink);line-height:1.1}
.controls{background:var(--white);border-bottom:1px solid var(--light);
  padding:8px 12px;position:sticky;
  top:calc(var(--safe-top) + 96px);z-index:40;display:flex;flex-direction:column;gap:8px}
.filter-row{display:flex;gap:6px;overflow-x:auto;-webkit-overflow-scrolling:touch;
  scrollbar-width:none;padding-bottom:1px}
.filter-row::-webkit-scrollbar{display:none}
.btn-f{font-family:"Zen Maru Gothic",sans-serif;font-size:13px;font-weight:500;
  padding:7px 14px;border-radius:20px;border:1.5px solid var(--light);
  background:var(--white);color:var(--ink);cursor:pointer;white-space:nowrap;
  flex-shrink:0;min-height:36px;-webkit-appearance:none}
.btn-f.active{background:var(--ink);color:var(--white);border-color:var(--ink)}
.btn-export{border-color:var(--clay);color:var(--clay)}
.lbl-import{border-color:var(--blue);color:var(--blue-dark);cursor:pointer;
  display:inline-flex;align-items:center}
.search{font-family:"Noto Sans JP",sans-serif;font-size:16px;width:100%;
  padding:9px 14px;border-radius:20px;border:1.5px solid var(--light);
  outline:none;background:var(--off);color:var(--ink);-webkit-appearance:none}
.search:focus{border-color:var(--clay);background:var(--white)}
#status{display:none;text-align:center;padding:7px 16px;
  font-family:"Zen Maru Gothic",sans-serif;font-size:12px;
  background:#e8f5e9;color:#2e7d32;border-bottom:1px solid #a5d6a7}
main{padding:14px 10px}
.yr-block{margin-bottom:28px}
.yr-label{font-family:"Zen Maru Gothic",sans-serif;font-weight:900;font-size:10px;
  letter-spacing:4px;text-transform:uppercase;color:var(--mid);
  padding-bottom:7px;border-bottom:1px solid var(--light);margin-bottom:12px}
.set-block{margin-bottom:20px}
.set-name{font-family:"Zen Maru Gothic",sans-serif;font-weight:700;font-size:11px;
  color:var(--mid);margin-bottom:7px;padding-left:2px}
.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.card{border:1.5px solid var(--light);border-radius:10px;overflow:hidden;
  background:var(--white);position:relative;cursor:pointer;transition:transform .12s}
.card:active{transform:scale(.97)}
.card.owned{border-color:var(--green);background:var(--green-bg)}
.card.custom{border-style:dashed;border-color:var(--blue)}
.card.custom.owned{border-style:solid}
.img-wrap{width:100%;aspect-ratio:2/3;background:var(--off);
  display:flex;align-items:center;justify-content:center;
  overflow:hidden;position:relative}
.img-wrap img{width:100%;height:100%;object-fit:cover;transition:opacity .3s}
.img-wrap img.loading{opacity:0}
.img-wrap img.loaded{opacity:1}
.ph{font-size:22px;opacity:.2}
.check{position:absolute;top:4px;right:4px;width:18px;height:18px;
  border-radius:50%;background:var(--green);display:none;
  align-items:center;justify-content:center;font-size:10px;color:#fff;font-weight:700}
.card.owned .check{display:flex}
.up-btn{position:absolute;bottom:0;left:0;right:0;
  background:linear-gradient(transparent,rgba(0,0,0,.4));
  display:flex;align-items:flex-end;justify-content:center;
  padding-bottom:5px;border:none;width:100%;cursor:pointer;min-height:40px}
.up-btn span{font-family:"Zen Maru Gothic",sans-serif;font-size:9px;font-weight:700;
  color:#fff;background:rgba(0,0,0,.5);padding:2px 7px;border-radius:8px;white-space:nowrap}
.no-photo .up-btn{background:transparent;align-items:center;padding-bottom:0}
.no-photo .up-btn span{background:var(--clay);font-size:10px;padding:3px 9px}
.rm-img{position:absolute;top:4px;left:4px;width:22px;height:22px;
  border-radius:50%;background:rgba(0,0,0,.55);border:none;
  color:#fff;font-size:10px;cursor:pointer;display:flex;
  align-items:center;justify-content:center;padding:0;z-index:2}
.del-card{position:absolute;top:4px;right:4px;width:22px;height:22px;
  border-radius:50%;background:rgba(198,40,40,.15);
  border:1.5px solid rgba(198,40,40,.3);color:#c62828;
  font-size:9px;font-weight:700;display:flex;align-items:center;
  justify-content:center;cursor:pointer;z-index:10}
.card-info{padding:5px 6px 6px}
.card-name{font-family:"Zen Maru Gothic",sans-serif;font-weight:700;
  font-size:11px;line-height:1.2}
.card-num{font-size:9px;color:var(--mid);margin-top:1px}
.chips{display:flex;flex-wrap:wrap;gap:3px;margin-top:4px}
.chip{font-size:8px;padding:3px 5px;border-radius:4px;min-height:20px;
  display:flex;align-items:center;cursor:pointer;
  background:var(--light);color:var(--mid)}
.chip.owned{background:var(--green);color:#fff}
.add-btn{border:1.5px dashed var(--blue);border-radius:10px;background:var(--white);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:4px;aspect-ratio:2/3;color:var(--mid);font-family:"Zen Maru Gothic",sans-serif;
  font-size:10px;cursor:pointer;width:100%;-webkit-appearance:none}
.add-btn:active{background:var(--off)}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);
  display:flex;align-items:flex-end;justify-content:center;
  z-index:100;backdrop-filter:blur(3px);-webkit-backdrop-filter:blur(3px)}
.overlay.hidden{display:none}
.modal{background:var(--white);border-radius:20px 20px 0 0;
  padding:20px 18px calc(var(--safe-bot) + 24px);
  width:100%;max-height:92vh;overflow-y:auto;-webkit-overflow-scrolling:touch}
.handle{width:36px;height:4px;background:var(--light);border-radius:2px;margin:0 auto 14px}
.modal h2{font-family:"Zen Maru Gothic",sans-serif;font-weight:900;font-size:17px;margin-bottom:14px}
.fg{margin-bottom:11px}
.fg label{font-family:"Zen Maru Gothic",sans-serif;font-size:10px;font-weight:500;
  color:var(--mid);display:block;margin-bottom:3px;letter-spacing:1px;text-transform:uppercase}
.fg input{font-family:"Noto Sans JP",sans-serif;font-size:16px;width:100%;
  padding:10px 13px;border:1.5px solid var(--light);border-radius:10px;
  outline:none;background:var(--off);color:var(--ink);-webkit-appearance:none}
.fg input:focus{border-color:var(--clay);background:var(--white)}
.m-img{width:100%;border:2px dashed var(--clay);border-radius:12px;
  display:flex;align-items:center;justify-content:center;overflow:hidden;
  cursor:pointer;background:var(--off);position:relative;margin-bottom:12px;height:150px}
.m-img img{width:100%;height:100%;object-fit:contain}
.m-ph{display:flex;flex-direction:column;align-items:center;gap:5px;
  color:var(--mid);font-family:"Zen Maru Gothic",sans-serif;font-size:11px;pointer-events:none}
.m-rm{position:absolute;top:7px;right:7px;background:rgba(0,0,0,.5);
  color:#fff;border:none;border-radius:50%;width:26px;height:26px;
  font-size:12px;cursor:pointer;display:none;align-items:center;justify-content:center}
.btn-row{display:flex;gap:10px;margin-top:14px}
.btn-ok{font-family:"Zen Maru Gothic",sans-serif;font-weight:700;font-size:15px;
  padding:13px;border-radius:12px;border:none;cursor:pointer;flex:1;
  min-height:48px;background:var(--ink);color:var(--white);-webkit-appearance:none}
.btn-cancel{font-family:"Zen Maru Gothic",sans-serif;font-weight:700;font-size:15px;
  padding:13px;border-radius:12px;border:1.5px solid var(--light);cursor:pointer;
  flex:1;min-height:48px;background:var(--off);color:var(--mid);-webkit-appearance:none}
#fi-card,#fi-modal,#fi-import{position:absolute;width:1px;height:1px;opacity:0;left:-9999px}
@media(min-width:600px){.grid{grid-template-columns:repeat(4,1fr);gap:10px}}
@media(min-width:900px){.grid{grid-template-columns:repeat(5,1fr)}
  body{max-width:900px;margin:0 auto}}
</style>
</head>
<body>
<header>
  <div class="title">森井ユカ</div>
  <div class="subtitle">Yuka Morii · Colección Personal</div>
  <div class="stats">
    <div class="stat"><strong id="s-owned">0</strong>obtenidas</div>
    <div class="stat"><strong id="s-total">0</strong>totales</div>
    <div class="stat"><strong id="s-pct">0%</strong>completado</div>
  </div>
</header>
<div id="status"></div>
<div class="controls">
  <div class="filter-row">
    <button class="btn-f active" data-f="all">Todas</button>
    <button class="btn-f" data-f="owned">Obtenidas</button>
    <button class="btn-f" data-f="missing">Faltantes</button>
    <button class="btn-f btn-export" id="btn-export">⬇️ Exportar</button>
    <label class="btn-f lbl-import" for="fi-import">⬆️ Importar</label>
  </div>
  <input class="search" id="search" type="text" placeholder="Buscar Pokémon…"
    autocorrect="off" autocapitalize="none" spellcheck="false">
</div>
<main id="main"></main>
<input type="file" id="fi-card" accept="image/*">
<input type="file" id="fi-modal" accept="image/*">
<input type="file" id="fi-import">
<div class="overlay hidden" id="modal">
  <div class="modal">
    <div class="handle"></div>
    <h2>+ Agregar carta</h2>
    <div class="m-img" id="m-img-wrap">
      <img id="m-img" src="" style="display:none">
      <div class="m-ph" id="m-ph"><span style="font-size:26px">🖼️</span><span>Tocar para foto</span></div>
      <button class="m-rm" id="m-rm">✕</button>
    </div>
    <div class="fg"><label>Pokémon</label><input id="f-name" type="text" placeholder="ej. Pikachu" autocorrect="off"></div>
    <div class="fg"><label>Número</label><input id="f-num" type="text" placeholder="ej. 25/100"></div>
    <div class="fg"><label>Set</label><input id="f-set" type="text" placeholder="ej. Base Set" autocorrect="off"></div>
    <div class="fg"><label>Año</label><input id="f-year" type="text" placeholder="ej. 2001" inputmode="numeric"></div>
    <div class="fg"><label>Variantes (coma)</label><input id="f-vars" type="text" placeholder="ej. Non-Holo, Reverse" autocorrect="off"></div>
    <div class="btn-row">
      <button class="btn-cancel" id="btn-cancel">Cancelar</button>
      <button class="btn-ok" id="btn-save">Agregar</button>
    </div>
  </div>
</div>

// ── IndexedDB ─────────────────────────────────────────────────────────────────
let _db;
function openDB(){
  if(_db) return Promise.resolve(_db);
  return new Promise((res,rej)=>{
    const r=indexedDB.open('ym2',1);
    r.onupgradeneeded=()=>r.result.createObjectStore('kv');
    r.onsuccess=()=>{_db=r.result;res(_db)};
    r.onerror=()=>rej(r.error);
  });
}
async function iget(k){const db=await openDB();return new Promise((r,j)=>{const q=db.transaction('kv','readonly').objectStore('kv').get(k);q.onsuccess=()=>r(q.result);q.onerror=()=>j(q.error)});}
async function iset(k,v){const db=await openDB();return new Promise((r,j)=>{const q=db.transaction('kv','readwrite').objectStore('kv').put(v,k);q.onsuccess=()=>r();q.onerror=()=>j(q.error)});}
async function idel(k){const db=await openDB();return new Promise((r,j)=>{const q=db.transaction('kv','readwrite').objectStore('kv').delete(k);q.onsuccess=()=>r();q.onerror=()=>j(q.error)});}
async function iallImgs(){
  const db=await openDB();
  return new Promise((res,rej)=>{
    const out={},cur=db.transaction('kv','readonly').objectStore('kv').openCursor();
    cur.onsuccess=e=>{const c=e.target.result;if(c){if(String(c.key).startsWith('img_'))out[c.key.slice(4)]=c.value;c.continue();}else res(out);};
    cur.onerror=()=>rej(cur.error);
  });
}

// ── Auto-image ────────────────────────────────────────────────────────────────
function autoImg(card){
  if(!card.num||!card.set)return null;
  const sid=SET_MAP[card.set];if(!sid)return null;
  const n=card.num.split('/')[0].replace(/^0+/,'');
  return `https://images.pokemontcg.io/${sid}/${n}.png`;
}

// ── Compress ──────────────────────────────────────────────────────────────────
function compress(file){
  return new Promise(res=>{
    const rd=new FileReader();
    rd.onload=()=>{
      const img=new Image();
      img.onload=()=>{
        const max=600;let w=img.width,h=img.height;
        if(w>max||h>max){if(w>h){h=Math.round(h*max/w);w=max;}else{w=Math.round(w*max/h);h=max;}}
        const c=document.createElement('canvas');c.width=w;c.height=h;
        const ctx=c.getContext('2d');ctx.fillStyle='#fff';ctx.fillRect(0,0,w,h);
        ctx.drawImage(img,0,0,w,h);res(c.toDataURL('image/jpeg',.72));
      };img.src=rd.result;
    };rd.readAsDataURL(file);
  });
}

// ── Render ────────────────────────────────────────────────────────────────────
function render(){
  const all=[...CARDS,...customCards];
  const oc=all.filter(c=>owned[c.id]).length;
  document.getElementById('s-owned').textContent=oc;
  document.getElementById('s-total').textContent=all.length;
  document.getElementById('s-pct').textContent=all.length?Math.round(oc/all.length*100)+'%':'0%';

  const q=searchQ.toLowerCase();
  const grouped={};
  all.forEach(card=>{
    if(q&&!card.name.toLowerCase().includes(q))return;
    if(filter==='owned'&&!owned[card.id])return;
    if(filter==='missing'&&owned[card.id])return;
    const yr=card.year||'extras',st=card.set||'—';
    if(!grouped[yr])grouped[yr]={};
    if(!grouped[yr][st])grouped[yr][st]=[];
    grouped[yr][st].push(card);
  });

  const years=Object.keys(grouped).sort((a,b)=>{
    if(a==='extras')return 1;if(b==='extras')return -1;return Number(a)-Number(b);
  });

  let html='';
  years.forEach(yr=>{
    html+=`<div class="yr-block"><div class="yr-label">©${yr==='extras'?'Extras':yr}</div>`;
    const sets=Object.keys(grouped[yr]);
    sets.forEach((st,si)=>{
      html+=`<div class="set-block"><div class="set-name">${st}</div><div class="grid">`;
      grouped[yr][st].forEach(card=>{
        const isO=!!owned[card.id],isC=!!card.custom;
        const uImg=images[card.id],imgUrl=uImg||autoImg(card);
        let imgHtml=imgUrl
          ?`<img src="${imgUrl}" alt="${card.name}" class="loading"
              onload="this.classList.remove('loading');this.classList.add('loaded')"
              onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">
             <span class="ph" style="display:none">🃏</span>`
          :`<span class="ph">🃏</span>`;
        const rmBtn=uImg?`<button class="rm-img" onclick="rmImg('${card.id}',event)">✕</button>`:'';
        const delBtn=isC?`<button class="del-card" onclick="delCard('${card.id}',event)">✕</button>`:'';
        const chips=(card.variants||[]).map(v=>{
          const ov=ownedVariants[card.id]?.[v];
          return `<div class="chip${ov?' owned':''}" onclick="togV('${card.id}','${v.replace(/'/g,"\'")}',event)">${v}</div>`;
        }).join('');
        html+=`<div class="card${isO?' owned':''}${isC?' custom':''}" onclick="togO('${card.id}')">
          <div class="img-wrap${imgUrl?'':' no-photo'}">
            ${imgHtml}<div class="check">✓</div>${rmBtn}${delBtn}
            <button class="up-btn" onclick="upImg('${card.id}',event)"><span>📷 foto</span></button>
          </div>
          <div class="card-info">
            <div class="card-name">${card.name}</div>
            <div class="card-num">${card.num}</div>
            ${chips?`<div class="chips">${chips}</div>`:''}
          </div>
        </div>`;
      });
      if(yr==='extras'&&si===sets.length-1){
        html+=`<button class="add-btn" onclick="openModal()"><span style="font-size:20px">＋</span><span>Agregar</span></button>`;
      }
      html+='</div></div>';
    });
    html+='</div>';
  });

  if(!html)html=`<div style="text-align:center;padding:60px 20px;color:var(--mid);font-family:'Zen Maru Gothic',sans-serif">
    <div style="font-size:40px;margin-bottom:12px">🔍</div><div>Sin resultados</div></div>`;
  document.getElementById('main').innerHTML=html;
}

function togO(id){owned[id]=!owned[id];saveOwned();render();}
function togV(id,v,e){e.stopPropagation();if(!ownedVariants[id])ownedVariants[id]={};
  ownedVariants[id][v]=!ownedVariants[id][v];saveVars();render();}
function upImg(id,e){e.stopPropagation();pendingCardId=id;document.getElementById('fi-card').click();}
async function rmImg(id,e){e.stopPropagation();await delImg(id);render();}
async function delCard(id,e){
  e.stopPropagation();if(!confirm('¿Eliminar esta carta?'))return;
  customCards=customCards.filter(c=>c.id!==id);
  delete owned[id];delete ownedVariants[id];await delImg(id);
  saveOwned();saveVars();saveCustom();render();
}

// ── Modal ─────────────────────────────────────────────────────────────────────
function openModal(){document.getElementById('modal').classList.remove('hidden');}
function closeModal(){
  document.getElementById('modal').classList.add('hidden');
  pendingModalImg=null;
  document.getElementById('m-img').style.display='none';
  document.getElementById('m-ph').style.display='flex';
  document.getElementById('m-rm').style.display='none';
  ['f-name','f-num','f-set','f-year','f-vars'].forEach(id=>document.getElementById(id).value='');
}
document.getElementById('m-img-wrap').addEventListener('click',()=>document.getElementById('fi-modal').click());
document.getElementById('m-rm').addEventListener('click',e=>{
  e.stopPropagation();pendingModalImg=null;
  document.getElementById('m-img').style.display='none';
  document.getElementById('m-ph').style.display='flex';
  document.getElementById('m-rm').style.display='none';
});
document.getElementById('modal').addEventListener('click',e=>{if(e.target===document.getElementById('modal'))closeModal();});
document.getElementById('btn-cancel').addEventListener('click',closeModal);
document.getElementById('btn-save').addEventListener('click',async()=>{
  const name=document.getElementById('f-name').value.trim();
  if(!name){document.getElementById('f-name').focus();return;}
  const id='custom_'+Date.now();
  const card={id,name,
    num:document.getElementById('f-num').value.trim()||'—',
    set:document.getElementById('f-set').value.trim()||'Custom',
    year:document.getElementById('f-year').value.trim()||'extras',
    variants:document.getElementById('f-vars').value.trim()
      ?document.getElementById('f-vars').value.trim().split(',').map(v=>v.trim()).filter(Boolean):[],
    custom:true};
  customCards.push(card);
  if(pendingModalImg)await saveImg(id,pendingModalImg);
  saveCustom();closeModal();render();
});

// ── File inputs ───────────────────────────────────────────────────────────────
document.getElementById('fi-card').addEventListener('change',async e=>{
  const f=e.target.files?.[0];if(!f||!pendingCardId)return;
  const url=await compress(f);
  await saveImg(pendingCardId,url);
  pendingCardId=null;e.target.value='';render();status('✅ Foto guardada');
});
document.getElementById('fi-modal').addEventListener('change',async e=>{
  const f=e.target.files?.[0];if(!f)return;
  const url=await compress(f);pendingModalImg=url;
  const img=document.getElementById('m-img');
  img.src=url;img.style.display='block';
  document.getElementById('m-ph').style.display='none';
  document.getElementById('m-rm').style.display='flex';
  e.target.value='';
});

// ── Filters ───────────────────────────────────────────────────────────────────
document.querySelectorAll('.btn-f[data-f]').forEach(btn=>{
  btn.addEventListener('click',()=>{
    document.querySelectorAll('.btn-f[data-f]').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');filter=btn.dataset.f;render();
  });
});
document.getElementById('search').addEventListener('input',e=>{searchQ=e.target.value;render();});

// ── Export ────────────────────────────────────────────────────────────────────
document.getElementById('btn-export').addEventListener('click',async()=>{
  const allImgs=await iallImgs();
  const payload={app:'yuka_morii_checklist',version:1,exportedAt:new Date().toISOString(),
    owned,ownedVariants,customCards,images:allImgs};
  const blob=new Blob([JSON.stringify(payload)],{type:'application/json'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url;a.download=`yuka-morii-backup-${new Date().toISOString().slice(0,10)}.json`;
  document.body.appendChild(a);a.click();document.body.removeChild(a);URL.revokeObjectURL(url);
  status('✅ Backup exportado');
});

// ── Import ────────────────────────────────────────────────────────────────────
document.getElementById('fi-import').addEventListener('change',async e=>{
  const f=e.target.files?.[0];if(!f)return;
  try{
    const text=await f.text();const p=JSON.parse(text);
    if(p.app!=='yuka_morii_checklist'){alert('Archivo no válido');return;}
    const ni=Object.keys(p.images||{}).length;
    if(!confirm(`Importar ${Object.keys(p.owned||{}).length} cartas y ${ni} fotos?
Reemplaza los datos actuales.`))return;
    owned=p.owned||{};ownedVariants=p.ownedVariants||{};customCards=p.customCards||[];
    saveOwned();saveVars();saveCustom();
    let i=0;
    for(const [id,url] of Object.entries(p.images||{})){
      await saveImg(id,url);i++;
      if(i%5===0)status(`Cargando fotos… ${i}/${ni}`,'#5c8fa8','#e3f2fd','#90caf9');
    }
    render();status(`✅ ${Object.keys(owned).length} cartas y ${ni} fotos importadas`);
  }catch(err){alert('Error: '+err.message);}
  e.target.value='';
});

// ── Init ──────────────────────────────────────────────────────────────────────
(async function init(){
  // Load owned/variants/custom from localStorage, seed from SEED if first time
  const lo=localStorage.getItem('ym_owned');
  if(lo){
    owned=ld('ym_owned',{});
    ownedVariants=ld('ym_vars',{});
    customCards=ld('ym_custom',[]);
  } else {
    owned=SEED.owned;ownedVariants=SEED.ownedVariants;customCards=SEED.customCards;
    saveOwned();saveVars();saveCustom();
  }

  // Load images from IndexedDB
  images=await iallImgs();

  // If no images yet, fetch photos.json from the same server (GitHub Pages)
  if(Object.keys(images).length===0){
    status('Cargando fotos…','#5c8fa8','#e3f2fd','#90caf9');
    try{
      const r=await fetch('photos.json');
      if(r.ok){
        const data=await r.json();
        const total=Object.keys(data).length;
        let i=0;
        for(const [id,url] of Object.entries(data)){
          await saveImg(id,url);i++;
          if(i%5===0)status(`Cargando fotos… ${i}/${total}`,'#5c8fa8','#e3f2fd','#90caf9');
        }
        status(`✅ ${total} fotos cargadas`);
      }
    }catch(err){console.warn('photos.json not found, continuing without photos');}
  }

  render();
})();
</script>
